services:
  postgis:
    image: postgis/postgis:16-3.4
    container_name: solafune_postgis
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-solafune}
      POSTGRES_USER: ${POSTGRES_USER:-solafune}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-solafune}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-solafune} -d ${POSTGRES_DB:-solafune}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
